name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

env:
  RELEASE_COMMITISH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_type == 'tag' && github.ref_name || format('main-{0}', github.run_number) }}
  RELEASE_NAME: ${{ github.event_name == 'push' && github.ref_type == 'tag' && format('WhatsNew {0}', github.ref_name) || format('WhatsNew main build {0}', github.run_number) }}
  RELEASE_BODY: ${{ github.event_name == 'push' && github.ref_type == 'tag' && 'Download the Windows, macOS, or Linux installer from the assets below.' || format('Automated prerelease build from main at {0}. Download the Windows, macOS, or Linux installer from the assets below.', github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha) }}

jobs:
  release:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_COMMITISH }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          APPLE_SIGNING_IDENTITY: "-"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_NAME }}
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: ${{ github.event_name != 'push' || github.ref_type != 'tag' || contains(github.ref_name, '-') }}
          releaseCommitish: ${{ env.RELEASE_COMMITISH }}
          args: ${{ matrix.args }}
